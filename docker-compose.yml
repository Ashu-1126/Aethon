version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: aethon-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE

  backend:
    # Expects Person 2 to put their FastAPI code in a /backend folder with a Dockerfile
    build:
      context: ./backend
    container_name: aethon-backend
    ports:
      - "8080:8080" # Backend runs on 8080 to avoid conflict with ChromaDB on 8000
    volumes:
      - backend_db:/app/data # For SQLite
    environment:
      # OpenRouter (LLM + embeddings) — provide your key via .env
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      - EMBED_MODEL=${EMBED_MODEL:-openai/text-embedding-3-small}
      - CHROMA_URL=http://chromadb:8000
      - CHROMA_CLOUD_API_KEY=${CHROMA_CLOUD_API_KEY:-}
      - CHROMA_TENANT=${CHROMA_TENANT:-default_tenant}
      - CHROMA_DATABASE=${CHROMA_DATABASE:-default_database}
    depends_on:
      - chromadb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aethon-frontend
    ports:
      - "3000:3000"
    environment:
      # P3 consumes these
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
      - NEXT_PUBLIC_USE_MOCK=false
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
  backend_db:
