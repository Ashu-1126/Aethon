version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: aethon-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE

  backend:
    # Expects Person 2 to put their FastAPI code in a /backend folder with a Dockerfile
    build:
      context: ./backend
    container_name: aethon-backend
    ports:
      - "8080:8080" # Backend runs on 8080 to avoid conflict with ChromaDB on 8000
    volumes:
      - backend_db:/app/data # For SQLite
    environment:
      - CHROMA_URL=http://chromadb:8000
    depends_on:
      - chromadb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aethon-frontend
    ports:
      - "3000:3000"
    environment:
      # P3 consumes these
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
      - NEXT_PUBLIC_USE_MOCK=false
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
  backend_db:
